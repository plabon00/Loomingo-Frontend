name: Build and Push Next.js Image

# 1. This tells GitHub to run this script every time you push to 'main'
on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 2. This grants the script permission to upload to your Packages
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GitHub automatically generates this secure token during the run:
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We are hardcoding your exact tag here
          tags: ghcr.io/plabon00/looming-frontend:latest